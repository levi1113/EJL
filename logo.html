<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EJL | Logo 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { margin: 0; overflow: hidden; background: #111827; }
        .info-text {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            letter-spacing: 0.05em;
            z-index: 10;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
            user-select: none;
        }
        .info-text span { color: rgba(255,255,255,0.5); }
        .brand {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            color: white;
        }
        .brand .name { color: white; font-weight: 600; font-size: 18px; letter-spacing: -0.02em; }
        .brand .name span { color: #818cf8; }
        .brand .sub { color: rgba(255,255,255,0.3); font-size: 11px; font-weight: 400; letter-spacing: 0.05em; }
        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.4);
            z-index: 5;
            font-size: 14px;
            letter-spacing: 0.05em;
            text-align: center;
            line-height: 1.6;
        }
        .video-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-container video {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }
        @media (max-width: 640px) {
            .brand { top: 16px; left: 16px; }
            .brand .logo-icon { width: 32px; height: 32px; font-size: 14px; }
            .brand .name { font-size: 14px; }
            .brand .sub { font-size: 9px; }
            .info-text { bottom: 16px; font-size: 10px; padding: 6px 16px; white-space: nowrap; }
            .video-container video {
                max-width: 95%;
                max-height: 70%;
            }
        }
    </style>
</head>
<body>

    <div class="brand">
        <div class="logo-icon">E</div>
        <div>
            <div class="name">EJL<span>.</span></div>
            <div class="sub">Ejército Juvenil Líbano</div>
        </div>
    </div>

    <div class="loading-text" id="loadingText">⏳ Cargando logo...</div>
    <div class="info-text"><span>✨</span> Logo 3D animado</div>

    <div class="video-container" id="videoContainer">
        <video 
            id="logoVideo"
            autoplay 
            muted 
            loop 
            playsinline
            style="background: transparent;"
        >
            <source src="./IMAGES/ejl_logo.mov" type="video/mp4">
            Tu navegador no soporta videos.
        </video>
    </div>

    <script>
        const video = document.getElementById('logoVideo');
        const loadingText = document.getElementById('loadingText');

        // Cuando el video se carga
        video.addEventListener('loadeddata', () => {
            loadingText.style.display = 'none';
            console.log('✅ Video cargado correctamente');
        });

        // Si hay error al cargar
        video.addEventListener('error', () => {
            loadingText.innerHTML = `
                ❌ No se pudo cargar el video<br>
                <span style="font-size:12px;color:rgba(255,255,255,0.3);">
                    Verifica que el archivo <strong>ejl_logo.mov</strong> esté en la carpeta IMAGES
                </span>
            `;
            loadingText.style.color = 'rgba(255,100,100,0.6)';
            console.error('❌ Error al cargar el video');
        });

        // Si el video se queda en blanco, forzar reproducción
        setTimeout(() => {
            if (video.paused) {
                video.play().catch(() => {
                    console.log('El usuario debe interactuar para reproducir');
                });
            }
        }, 1000);
    </script>
</body>
</html>
